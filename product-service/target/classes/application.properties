spring.application.name=product-service
server.port=8000

spring.datasource.url=jdbc:postgresql://localhost/db_product
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.locations=classpath:db_migration

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true
eureka.instance.metadata-map.version=0.0.1-SNAPSHOT
eureka.instance.metadata-map.description=Product Service with Resilience4j

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=product-service
info.app.version=0.0.1-SNAPSHOT
info.app.description=Product Service

# Feign: habilita circuit breaker via Resilience4j
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j - Circuit Breaker para currency-service
resilience4j.circuitbreaker.instances.currency-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.currency-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.currency-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.currency-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.currency-service.register-health-indicator=true

# Resilience4j - Retry com exponential backoff e jitter
resilience4j.retry.instances.currency-service.max-attempts=3
resilience4j.retry.instances.currency-service.wait-duration=500ms
resilience4j.retry.instances.currency-service.enable-exponential-backoff=true
resilience4j.retry.instances.currency-service.exponential-backoff-multiplier=2
resilience4j.retry.instances.currency-service.exponential-max-wait-duration=5s

# Resilience4j - TimeLimiter (timeout)
resilience4j.timelimiter.instances.currency-service.timeout-duration=3s

# Cache Caffeine
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=60s

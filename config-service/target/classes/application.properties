# =============================================
# config-service
# =============================================

spring.application.name=config-service
server.port=8888

spring.cloud.config.server.git.uri=https://github.com/MOrfeu669/Micro-_services.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=/microservices/configs/{application}

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true
eureka.instance.metadata-map.github.repo=MOrfeu669/Micro-_services_Java_2026

management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.description=Spring Cloud Config Server
info.app.autor=Bernardo Cristiano

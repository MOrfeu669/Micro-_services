spring.application.name=config-service
server.port=8888

spring.cloud.config.server.git.uri=https://github.com/luciano-ferretto/ParadLingProg_202601.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=/microservices/configs/{application}

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=config-service
info.app.version=0.0.1-SNAPSHOT
info.app.description=Spring Cloud Config Server

spring.application.name=greeting-service
server.port=8080

greeting-service.greeting=Ola
greeting-service.default-name=Mundo

spring.profiles.active=fr

spring.config.import=optional:configserver:http://localhost:8888/

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true
eureka.instance.metadata-map.version=0.0.1-SNAPSHOT
eureka.instance.metadata-map.description=Greeting Service

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=greeting-service
info.app.version=0.0.1-SNAPSHOT
info.app.description=Greeting Service

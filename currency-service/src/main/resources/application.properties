spring.application.name=currency-service
server.port=8100

spring.datasource.url=jdbc:postgresql://localhost/db_currency
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.locations=classpath:db_migration

eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true
eureka.instance.metadata-map.version=@project.version@
eureka.instance.metadata-map.description=Currency Service - BCB Integration

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=Currency Service with BCB Integration

# URL base da API do Banco Central do Brasil (PTAX)
bcb.api.url=https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata

# Feign: habilita suporte a fallback via Resilience4j
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j - Circuit Breaker para BCBClient
resilience4j.circuitbreaker.instances.bcb-client.sliding-window-size=5
resilience4j.circuitbreaker.instances.bcb-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bcb-client.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.bcb-client.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bcb-client.register-health-indicator=true

# Resilience4j - Retry para BCBClient
resilience4j.retry.instances.bcb-client.max-attempts=3
resilience4j.retry.instances.bcb-client.wait-duration=500ms
resilience4j.retry.instances.bcb-client.enable-exponential-backoff=true
resilience4j.retry.instances.bcb-client.exponential-backoff-multiplier=2
resilience4j.retry.instances.bcb-client.exponential-max-wait-duration=5s

# Resilience4j - TimeLimiter para BCBClient
resilience4j.timelimiter.instances.bcb-client.timeout-duration=3s
